<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airstep Studio V3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">AIRSTEP STUDIO</div>
        <div class="status-bar">
            <span id="connection-status" class="status-dot">●</span>
            <span id="active-profile">Profil : Global</span>
            <button id="btn-settings" onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="cockpit">

        <!-- COLONNE GAUCHE (70%) -->
        <section class="media-zone">
            <!-- Lecteur -->
            <div id="video-container">
                <div id="player"></div>
                <iframe id="generic-player" style="width:100%; height:100%; display:none; border:none;" allowfullscreen></iframe>
            </div>

            <!-- Pédalier Virtuel (Sync) -->
            <div id="pedalboard-container">
                <div id="pedalboard-grid">
                    <div class="empty-state">En attente...</div>
                </div>
            </div>
        </section>

        <!-- COLONNE DROITE (30%) -->
        <section class="sidebar-zone">

            <!-- SECTION CONTROL MODE -->
            <div class="sidebar-section">
                <div class="section-title">Contrôle</div>
                <div class="mode-switch">
                    <div class="toggle-btn-group">
                        <button id="mode-win" class="active" onclick="setMode('WIN')">WINDOWS</button>
                        <button id="mode-web" onclick="setMode('WEB')">WEB</button>
                    </div>
                </div>
            </div>

            <!-- SECTION SETLIST -->
            <div class="sidebar-section">
                <div class="section-title">Bibliothèque Musicale</div>

                <!-- Search -->
                <input type="text" id="search-input" placeholder="Rechercher..." onkeyup="renderSetlist(currentTrackList)" style="width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box;">

                <!-- Add Form -->
                <div class="input-group" style="display:flex; flex-direction:column; gap:5px; margin-bottom:10px;">
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="url-input" placeholder="URL..." style="flex:1;">
                        <select id="mode-select" style="width:70px;">
                            <option value="auto">Auto</option>
                            <option value="iframe">Embed</option>
                            <option value="external">Win</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input list="categories" id="category-input" placeholder="Catégorie (ex: Rock)" style="flex:1;">
                        <datalist id="categories"></datalist>
                        <button onclick="addToSetlist()" style="width:40px;">+</button>
                    </div>
                </div>

                <div id="setlist-container"></div>
            </div>

            <!-- SECTION APPS -->
            <div class="sidebar-section">
                <div class="section-title">Apps Launcher</div>
                <div id="apps-container" class="app-grid">
                    <!-- Apps JS -->
                </div>
                <div style="margin-top:5px; display:flex; gap:5px;">
                    <input type="text" id="app-name" placeholder="Nom">
                    <input type="text" id="app-path" placeholder="Chemin .exe">
                    <button onclick="addApp()">+</button>
                </div>
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>

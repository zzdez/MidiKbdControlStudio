<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airstep Studio V3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">AIRSTEP STUDIO</div>
        <div class="status-bar">
            <span id="connection-status" class="status-dot">●</span>
            <span id="active-profile">Profil : Global</span>
            <button id="btn-settings" onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="cockpit">

        <!-- COLONNE GAUCHE (70%) -->
        <section class="media-zone">
            <!-- Lecteur -->
            <div id="video-container">
                <div id="player"></div>
                <iframe id="generic-player" style="width:100%; height:100%; display:none; border:none;" allowfullscreen></iframe>
            </div>

            <!-- Pédalier Virtuel (Sync) -->
            <div id="pedalboard-container">
                <div id="pedalboard-grid">
                    <div class="empty-state">En attente...</div>
                </div>
            </div>
        </section>

        <!-- COLONNE DROITE (30%) -->
        <section class="sidebar-zone">

            <!-- SECTION CONTROL MODE -->
            <div class="sidebar-section">
                <div class="section-title">Contrôle</div>
                <div class="mode-switch">
                    <div class="toggle-btn-group">
                        <button id="mode-win" class="active" onclick="setMode('WIN')">WINDOWS</button>
                        <button id="mode-web" onclick="setMode('WEB')">WEB</button>
                    </div>
                </div>
            </div>

            <!-- SECTION SETLIST -->
            <div class="sidebar-section">
                <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    Bibliothèque Musicale
                    <button class="btn-icon" onclick="openAddModal()">+</button>
                </div>

                <!-- Search -->
                <input type="text" id="search-input" placeholder="Filtrer..." onkeyup="renderSetlist(currentTrackList)" style="width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box;">

                <div id="setlist-container"></div>
            </div>

            <!-- SECTION APPS -->
            <div class="sidebar-section">
                <div class="section-title">Apps Launcher</div>
                <div id="apps-container" class="app-grid">
                    <!-- Apps JS -->
                </div>
                <div style="margin-top:5px; display:flex; gap:5px;">
                    <input type="text" id="app-name" placeholder="Nom">
                    <input type="text" id="app-path" placeholder="Chemin .exe">
                    <button onclick="addApp()">+</button>
                </div>
            </div>

        </section>

    </main>

    <!-- MEDIA MODAL -->
    <dialog id="media-modal">
        <div class="modal-header">
            <h3>Ajouter / Modifier un Média</h3>
            <button onclick="closeModal()" class="btn-close">×</button>
        </div>

        <div class="modal-body">
            <!-- Search Zone -->
            <div class="search-zone">
                <div class="input-group">
                    <input type="text" id="yt-search-input" placeholder="Recherche YouTube ou URL..." onkeydown="if(event.key==='Enter') searchYouTube()">
                    <button onclick="searchYouTube()">🔍</button>
                </div>
                <div id="search-results" class="results-grid"></div>
            </div>

            <hr class="separator">

            <!-- Edit Form -->
            <div class="edit-form" style="display:flex; gap:15px;">
                <!-- Thumbnail Preview (Left) -->
                <div style="width:120px; flex-shrink:0;">
                    <div id="preview-thumbnail" style="width:100%; aspect-ratio:16/9; background:#000; display:flex; align-items:center; justify-content:center; border:1px solid #333; overflow:hidden;">
                        <span style="font-size:30px;">🎵</span>
                    </div>
                </div>

                <!-- Fields (Right) -->
                <div style="flex:1;">
                    <label>Titre</label>
                    <input type="text" id="edit-title" placeholder="Titre de la chanson">

                    <label>Artiste / Groupe</label>
                    <input type="text" id="edit-artist" placeholder="Ex: Metallica">

                    <label>URL</label>
                    <input type="text" id="edit-url" placeholder="https://...">

                    <div class="row-inputs">
                        <div class="col">
                            <label>Chaîne YouTube</label>
                            <input type="text" id="edit-channel" placeholder="Nom de la chaîne">
                        </div>
                    </div>

                    <div class="row-inputs">
                        <div class="col">
                            <label>Catégorie (Fonction)</label>
                            <input list="categories" id="edit-category" placeholder="Ex: Cours, Cover...">
                            <datalist id="categories"></datalist>
                        </div>
                        <div class="col">
                            <label>Genre (Style)</label>
                            <input list="genres" id="edit-genre" placeholder="Ex: Rock, Jazz...">
                            <datalist id="genres"></datalist>
                        </div>
                    </div>

                    <div class="row-inputs">
                        <div class="col">
                            <label>Mode</label>
                            <select id="edit-mode">
                                <option value="auto">Auto (Détection)</option>
                                <option value="iframe">Intégré (YouTube)</option>
                                <option value="external">Externe (Navigateur)</option>
                            </select>
                        </div>
                    </div>

                    <label>Description YouTube</label>
                    <textarea id="edit-youtube-description" rows="3" style="width:100%; background:#1a1a1a; border:1px solid #333; color:#aaa; padding:5px; font-size:0.8em;" placeholder="Description officielle..." readonly></textarea>

                    <label>Mes Notes / Résumé</label>
                    <textarea id="edit-user-notes" rows="3" style="width:100%; background:#121212; border:1px solid #333; color:white; padding:5px;" placeholder="Mes notes personnelles, accords, structure..."></textarea>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" onclick="previewItem()">Prévisualiser</button>
            <div style="flex:1"></div>
            <button class="btn-text" onclick="closeModal()">Annuler</button>
            <button class="btn-primary" onclick="saveItem()">Sauvegarder</button>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>

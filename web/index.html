<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirstepStudio</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #status {
            color: #888;
            margin-bottom: 20px;
        }
        #profile-card {
            background-color: #292929;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
        }
        #profile-label {
            font-size: 0.8em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        #profile-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #4facfe;
        }
        #midi-display {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background-color: #1e1e1e;
            width: 80%;
            max-width: 600px;
            transition: border-color 0.2s;
        }
        .connected { color: #4caf50; }
        .disconnected { color: #f44336; }

        .midi-flash {
            border-color: #4facfe !important;
        }
    </style>
</head>
<body>
    <h1>AirstepStudio</h1>
    <div id="status">En attente de connexion...</div>

    <div id="profile-card">
        <div id="profile-label">PROFIL ACTIF</div>
        <div id="profile-name">Global / Aucun</div>
    </div>

    <div id="midi-display">--</div>

    <script>
        const statusEl = document.getElementById('status');
        const midiDisplayEl = document.getElementById('midi-display');
        const profileNameEl = document.getElementById('profile-name');

        let socket;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.textContent = 'Connecté';
                statusEl.className = 'connected';
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === "midi") {
                        midiDisplayEl.textContent = data.message;

                        // Visual Flash
                        midiDisplayEl.classList.add('midi-flash');
                        setTimeout(() => midiDisplayEl.classList.remove('midi-flash'), 100);

                    } else if (data.type === "profile_change") {
                        profileNameEl.textContent = data.profile;
                        // Flash effect for profile change if desired
                    }

                } catch (e) {
                    // Fallback for raw text (legacy)
                    console.log("Raw message:", event.data);
                    if (!event.data.startsWith("{")) {
                        midiDisplayEl.textContent = event.data;
                    }
                }
            };

            socket.onclose = () => {
                statusEl.textContent = 'Déconnecté - Reconnexion...';
                statusEl.className = 'disconnected';
                setTimeout(connect, 3000);
            };

            socket.onerror = (error) => {
                console.error('WebSocket Error:', error);
            };
        }

        connect();
    </script>
</body>
</html>

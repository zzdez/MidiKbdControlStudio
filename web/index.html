<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airstep Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- API YouTube Iframe -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">AIRSTEP STUDIO</div>
        <div class="status-bar">
            <span id="connection-status" class="status-dot">●</span>
            <span id="active-profile">Profil : Global</span>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="cockpit">

        <!-- COLONNE GAUCHE : MEDIA & SETLIST -->
        <section class="media-zone">
            <!-- Lecteur YouTube -->
            <div id="video-container">
                <div id="player"></div>
                <iframe id="generic-player" style="width:100%; height:100%; display:none; border:none;" allowfullscreen></iframe>
            </div>

            <!-- Setlist Manager -->
            <div class="setlist-manager">
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="Coller une URL YouTube...">
                    <select id="mode-select" style="padding: 8px; background: #333; color: white; border: 1px solid #444; border-radius: 4px;">
                        <option value="auto">Auto</option>
                        <option value="iframe">Intégré</option>
                        <option value="external">Externe</option>
                    </select>
                    <button onclick="addToSetlist()">Ajouter</button>
                </div>
                <div id="setlist-container">
                    <!-- Liste générée par JS -->
                </div>
            </div>
        </section>

        <!-- COLONNE DROITE : CONTROLE -->
        <section class="control-zone">
            <!-- Mode Switch -->
            <div class="mode-switch">
                <label>Mode Contrôle : </label>
                <div class="toggle-btn-group">
                    <button id="mode-win" class="active" onclick="setMode('WIN')">WINDOWS (App)</button>
                    <button id="mode-web" onclick="setMode('WEB')">WEB (YouTube)</button>
                </div>
            </div>

            <!-- Pédalier Virtuel -->
            <div id="pedalboard-grid">
                <div class="empty-state">En attente du profil...</div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
